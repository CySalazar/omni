# =============================================================================
# OMNI OS — Core CI workflow (Gitea Actions)
# =============================================================================
# Hybrid CI: the public repo lives on GitHub; CI runs on the self-hosted Gitea
# instance via act_runner. Gitea reads `.gitea/workflows/` with precedence over
# `.github/workflows/`, so this file (NOT the GitHub `ci.yml`) is what executes
# on Gitea. See `docs/planning/2026-05-29-gitea-ci-hybrid.md` for setup.
#
# POSTURE (2026-05-29): fmt + clippy + doc are REPORT-ONLY (continue-on-error)
# while the pre-existing debt accumulated during the GitHub Actions outage is
# cleared (~692 fmt diffs, ~82 clippy -D-warnings + 6 deny-level errors in
# omni-hal). Tests, builds, and deny(bans/licenses/sources) are BLOCKING.
# Flip the `continue-on-error` flags to `false` (or remove them) once each
# debt reaches zero, to make this a strict gate equal to the GitHub CI intent.
# =============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  # ---------------------------------------------------------------------------
  # fmt — REPORT-ONLY (canonical formatter is nightly rustfmt; rustfmt.toml
  # uses nightly-only options). Flip continue-on-error to false after a
  # `cargo +nightly fmt --all` repo-wide normalization commit.
  # ---------------------------------------------------------------------------
  fmt:
    name: cargo fmt (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: cargo +nightly fmt --all -- --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # clippy — REPORT-ONLY until the Sprint-10 clippy debt is cleared.
  # ---------------------------------------------------------------------------
  clippy:
    name: cargo clippy (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets --all-features -- -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # test — BLOCKING. omni-kernel --lib tests SIGSEGV on some x86_64 Linux
  # hosts; run them in a separate non-blocking job so a flaky host crash does
  # not red the whole pipeline.
  # ---------------------------------------------------------------------------
  test:
    name: cargo test (workspace, excl. omni-kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace --exclude omni-kernel --all-features
        run: cargo test --workspace --exclude omni-kernel --all-features

  test-kernel:
    name: cargo test omni-kernel (report-only — host SIGSEGV)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test -p omni-kernel --all-features
        run: cargo test -p omni-kernel --all-features

  # ---------------------------------------------------------------------------
  # doc — REPORT-ONLY until doc warnings are cleared.
  # ---------------------------------------------------------------------------
  doc:
    name: cargo doc (report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --workspace --no-deps --all-features
        run: cargo doc --workspace --no-deps --all-features

  # ---------------------------------------------------------------------------
  # bare-metal-build — BLOCKING (K3 gate, OIP-Kernel-012).
  # ---------------------------------------------------------------------------
  bare-metal-build:
    name: bare-metal build (x86_64-unknown-none)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: >-
        -D warnings
        --cfg poly1305_force_soft
        --cfg chacha20_force_soft
        --cfg curve25519_dalek_backend="serial"
        --cfg sha2_backend="soft"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (bare-metal)
        run: cargo build -p omni-kernel --features bare-metal --target x86_64-unknown-none
      - name: cargo clippy (bare-metal)
        run: cargo clippy -p omni-kernel --features bare-metal --target x86_64-unknown-none -- -D warnings

  # ---------------------------------------------------------------------------
  # kernel-runner-build — BLOCKING (K4 gate). Artifact upload is best-effort:
  # Gitea's artifact backend must be enabled and actions/upload-artifact on
  # Gitea is most reliable at v3. Kept continue-on-error so a missing artifact
  # backend does not red the build gate.
  # ---------------------------------------------------------------------------
  kernel-runner-build:
    name: kernel-runner build (x86_64-unknown-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: cargo build kernel-runner (release)
        run: cargo build --manifest-path kernel-runner/Cargo.toml --target x86_64-unknown-none --release
      - name: cargo clippy kernel-runner
        run: cargo clippy --manifest-path kernel-runner/Cargo.toml --target x86_64-unknown-none -- -D warnings
      - name: Upload kernel-runner binary (best-effort on Gitea)
        continue-on-error: true
        uses: actions/upload-artifact@v3
        with:
          name: kernel-runner-x86_64-unknown-none
          path: kernel-runner/target/x86_64-unknown-none/release/kernel-runner
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # blanket-allow-guard — BLOCKING (ADR-0003). Cheap script gate.
  # ---------------------------------------------------------------------------
  blanket-allow-guard:
    name: blanket #![allow] guard (ADR-0003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: scripts/check-no-blanket-allow.sh
        run: bash scripts/check-no-blanket-allow.sh

  # ---------------------------------------------------------------------------
  # deny — bans/licenses/sources BLOCKING; advisories REPORT-ONLY (stale
  # advisory-db CVSS-4.0 parse issue with older cargo-deny).
  # ---------------------------------------------------------------------------
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install cargo-deny
        run: cargo install cargo-deny --locked || true
      - name: cargo deny check advisories (report-only)
        continue-on-error: true
        run: cargo deny check advisories
      - name: cargo deny check bans licenses sources
        run: cargo deny check bans licenses sources
