# =============================================================================
# OMNI OS — DCO sign-off check (Gitea Actions)
# =============================================================================
# Every commit on a PR must include a `Signed-off-by:` trailer. See
# CONTRIBUTING.md § 3. Gitea maps its PR metadata onto the `github.*` context,
# so this is a near-verbatim port of `.github/workflows/dco.yml`.
# =============================================================================

name: dco

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  dco-check:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        run: |
          set -eu
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          MISSING=0
          for sha in $(git rev-list --no-merges "$BASE..$HEAD"); do
            BODY=$(git log -1 --format='%B' "$sha")
            if ! echo "$BODY" | grep -qE "^Signed-off-by: .+ <.+@.+>$"; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer."
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING commit(s) missing Signed-off-by. See CONTRIBUTING.md § 3."
            echo "Fix with: git rebase --signoff $BASE"
            exit 1
          fi
          echo "All commits in this PR are DCO-signed."
