# =============================================================================
# OMNI OS — Auto-labeler workflow
# =============================================================================
# Applies labels to PRs based on changed paths defined in .github/labeler.yml.
# =============================================================================

name: labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
