# =============================================================================
# OMNI OS — Core CI workflow
# =============================================================================
# Runs on every push and PR. Hard blockers for merge.
# Target wall-clock for the full job: < 10 minutes (per todo.md P0.4).
# =============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One run per ref; cancel in-progress runs of the same ref when a new push
# arrives. PRs and pushes get separate concurrency groups to avoid one
# canceling the other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  # ---------------------------------------------------------------------------
  # fmt — formatting must be a no-op on a fresh checkout.
  # ---------------------------------------------------------------------------
  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # clippy — zero warnings on the workspace.
  # ---------------------------------------------------------------------------
  clippy:
    name: cargo clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `--all-features` matches the `cargo test` job below and the local
      # verify-state command. Without it, cfg-gated modules like
      # `omni-tee::tdx` / `omni-tee::sev_snp` would not be linted.
      - name: cargo clippy --workspace --all-targets --all-features -- -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # test — unit + integration tests on the initial target only.
  # Targets per /docs/07-hardware-requirements.md: x86_64-unknown-linux-gnu.
  # Cross-compilation matrix expands when omni-tee gains AMD/ARM backends.
  # ---------------------------------------------------------------------------
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features

  # ---------------------------------------------------------------------------
  # doc — link check + warnings-as-errors so docs don't rot silently.
  # ---------------------------------------------------------------------------
  doc:
    name: cargo doc
    runs-on: ubuntu-24.04
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--all-features` matches the `cargo test` and `cargo clippy` jobs
      # and the local verify-state command. Without it, intra-doc links
      # to cfg-gated items (`omni-tee::tdx`, `omni-tee::sev_snp`) fail
      # under `RUSTDOCFLAGS=-D warnings` because the items are not in
      # scope.
      - name: cargo doc --workspace --no-deps --all-features
        run: cargo doc --workspace --no-deps --all-features

  # ---------------------------------------------------------------------------
  # bare-metal-build — K3 gate of OIP-Kernel-003 § 3 (per OIP-Kernel-012).
  # Cross-builds omni-kernel for `x86_64-unknown-none` with the
  # `bare-metal` feature on. This is the build that fails today because
  # the kernel lacks `#[panic_handler]` / `#[global_allocator]`; once
  # OIP-Kernel-012 ratifies, this job stays green on every PR.
  # ---------------------------------------------------------------------------
  bare-metal-build:
    name: bare-metal build (x86_64-unknown-none)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (bare-metal)
        run: |
          cargo build -p omni-kernel --features bare-metal \
            --target x86_64-unknown-none
      - name: cargo clippy (bare-metal)
        run: |
          cargo clippy -p omni-kernel --features bare-metal \
            --target x86_64-unknown-none -- -D warnings

  # ---------------------------------------------------------------------------
  # kernel-runner-build — K4 gate of OIP-Kernel-003 § 3 (per
  # OIP-Kernel-005 § S11 K4.e). Cross-builds the bootable artifact (the
  # `kernel-runner` bin) for `x86_64-unknown-none`. Uploads the binary as
  # a CI artifact so K5 (QEMU smoke test) can consume it. The
  # kernel-runner crate is workspace-excluded; cargo is invoked with
  # --manifest-path explicitly.
  # ---------------------------------------------------------------------------
  kernel-runner-build:
    name: kernel-runner build (x86_64-unknown-none)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: cargo build kernel-runner (release)
        run: |
          cargo build --manifest-path kernel-runner/Cargo.toml \
            --target x86_64-unknown-none --release
      - name: cargo clippy kernel-runner
        run: |
          cargo clippy --manifest-path kernel-runner/Cargo.toml \
            --target x86_64-unknown-none -- -D warnings
      - name: Upload kernel-runner binary
        uses: actions/upload-artifact@v4
        with:
          name: kernel-runner-x86_64-unknown-none
          path: kernel-runner/target/x86_64-unknown-none/release/kernel-runner
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # tbd-guard — fail if the merge target contains TBD/TODO placeholders that
  # were intentionally allowed in P0 docs but should never reach `main` after
  # Stichting incorporation. Today, this only WARNS so we can ship the P0
  # placeholder set; flip to `exit 1` after Stichting OMNI is registered.
  # ---------------------------------------------------------------------------
  tbd-guard:
    name: TBD placeholder guard
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: "Scan diff for newly introduced <TBD: ...> markers"
        run: |
          set -eu
          # Only flag NEW TBD lines (added in this PR), not pre-existing ones.
          # `git diff --diff-filter=AM` shows added/modified lines.
          ADDED_TBD=$(git diff --diff-filter=AM origin/${{ github.base_ref }}...HEAD -- ':(exclude)*.lock' \
            | grep -E '^\+' \
            | grep -E '<TBD:[^>]+>' \
            || true)
          if [ -n "$ADDED_TBD" ]; then
            echo "::warning::This PR introduces new <TBD: ...> placeholders:"
            echo "$ADDED_TBD"
            echo "::warning::Acceptable during P0 setup; not after Stichting incorporation."
          fi
