# =============================================================================
# OMNI OS — Core CI workflow
# =============================================================================
# Runs on every push and PR. Hard blockers for merge.
# Target wall-clock for the full job: < 10 minutes (per todo.md P0.4).
# =============================================================================

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One run per ref; cancel in-progress runs of the same ref when a new push
# arrives. PRs and pushes get separate concurrency groups to avoid one
# canceling the other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  # ---------------------------------------------------------------------------
  # fmt — formatting must be a no-op on a fresh checkout.
  # ---------------------------------------------------------------------------
  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # clippy — zero warnings on the workspace.
  # ---------------------------------------------------------------------------
  clippy:
    name: cargo clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `--all-features` matches the `cargo test` job below and the local
      # verify-state command. Without it, cfg-gated modules like
      # `omni-tee::tdx` / `omni-tee::sev_snp` would not be linted.
      - name: cargo clippy --workspace --all-targets --all-features -- -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # test — unit + integration tests on the initial target only.
  # Targets per /docs/07-hardware-requirements.md: x86_64-unknown-linux-gnu.
  # Cross-compilation matrix expands when omni-tee gains AMD/ARM backends.
  # ---------------------------------------------------------------------------
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--test-threads=1` works around the pre-existing SIGSEGV in
      # `bare_metal::paging::tests::TestArena` (carryover from v0.2.0).
      # The arena pretends an `alloc_zeroed` heap region is the
      # "physical" memory window at `PHYS_BASE = 0x0100_0000` and lets
      # `PageMapper` dereference `phys_offset + phys_addr`. Under the
      # parallel test harness, sibling arenas can overlap and a page-
      # table write in one test scribbles into another's allocation,
      # producing an OOB dereference. Serialising the test binary
      # sidesteps the race; the proper fix (refactor `TestArena` to
      # isolate or `Mutex`-serialise the affected tests) is tracked as
      # a follow-up after Track B closure.
      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features -- --test-threads=1

  # ---------------------------------------------------------------------------
  # doc — link check + warnings-as-errors so docs don't rot silently.
  # ---------------------------------------------------------------------------
  doc:
    name: cargo doc
    runs-on: ubuntu-24.04
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--all-features` matches the `cargo test` and `cargo clippy` jobs
      # and the local verify-state command. Without it, intra-doc links
      # to cfg-gated items (`omni-tee::tdx`, `omni-tee::sev_snp`) fail
      # under `RUSTDOCFLAGS=-D warnings` because the items are not in
      # scope.
      - name: cargo doc --workspace --no-deps --all-features
        run: cargo doc --workspace --no-deps --all-features

  # ---------------------------------------------------------------------------
  # bare-metal-build — K3 gate of OIP-Kernel-003 § 3 (per OIP-Kernel-012).
  # Cross-builds omni-kernel for `x86_64-unknown-none` with the
  # `bare-metal` feature on. This is the build that fails today because
  # the kernel lacks `#[panic_handler]` / `#[global_allocator]`; once
  # OIP-Kernel-012 ratifies, this job stays green on every PR.
  # ---------------------------------------------------------------------------
  bare-metal-build:
    name: bare-metal build (x86_64-unknown-none)
    runs-on: ubuntu-24.04
    # Override workflow-level `RUSTFLAGS: -D warnings` so the
    # `.cargo/config.toml` force-soft cfgs for poly1305/chacha20/curve25519/sha2
    # (MB13.a, required to dodge the LLVM SIMD legalisation ICE on
    # x86_64-unknown-none) are not stomped. Env-level RUSTFLAGS fully replaces
    # config-level `target.<triple>.rustflags`; cargo does not merge the two.
    env:
      RUSTFLAGS: >-
        -D warnings
        --cfg poly1305_force_soft
        --cfg chacha20_force_soft
        --cfg curve25519_dalek_backend="serial"
        --cfg sha2_backend="soft"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (bare-metal)
        run: |
          cargo build -p omni-kernel --features bare-metal \
            --target x86_64-unknown-none
      - name: cargo clippy (bare-metal)
        run: |
          cargo clippy -p omni-kernel --features bare-metal \
            --target x86_64-unknown-none -- -D warnings

  # ---------------------------------------------------------------------------
  # kernel-runner-build — K4 gate of OIP-Kernel-003 § 3 (per
  # OIP-Kernel-005 § S11 K4.e). Cross-builds the bootable artifact (the
  # `kernel-runner` bin) for `x86_64-unknown-none`. Uploads the binary as
  # a CI artifact so K5 (QEMU smoke test) can consume it. The
  # kernel-runner crate is workspace-excluded; cargo is invoked with
  # --manifest-path explicitly.
  # ---------------------------------------------------------------------------
  kernel-runner-build:
    name: kernel-runner build (x86_64-unknown-none)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: cargo build kernel-runner (release)
        run: |
          cargo build --manifest-path kernel-runner/Cargo.toml \
            --target x86_64-unknown-none --release
      - name: cargo clippy kernel-runner
        run: |
          cargo clippy --manifest-path kernel-runner/Cargo.toml \
            --target x86_64-unknown-none -- -D warnings
      - name: Upload kernel-runner binary
        uses: actions/upload-artifact@v4
        with:
          name: kernel-runner-x86_64-unknown-none
          path: kernel-runner/target/x86_64-unknown-none/release/kernel-runner
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # blanket-allow-guard — enforce ADR-0003: no blanket #![allow(<group>)]
  # at crate root in scoped production crates. Cheap (~2 s) early gate that
  # blocks before the heavier cargo clippy matrix.
  # ---------------------------------------------------------------------------
  blanket-allow-guard:
    name: blanket #![allow] guard (ADR-0003)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: scripts/check-no-blanket-allow.sh
        run: bash scripts/check-no-blanket-allow.sh

  # ---------------------------------------------------------------------------
  # tbd-guard — fail if the merge target contains TBD/TODO placeholders that
  # were intentionally allowed in P0 docs but should never reach `main` after
  # Stichting incorporation. Today, this only WARNS so we can ship the P0
  # placeholder set; flip to `exit 1` after Stichting OMNI is registered.
  # ---------------------------------------------------------------------------
  tbd-guard:
    name: TBD placeholder guard
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: "Scan diff for newly introduced <TBD: ...> markers"
        run: |
          set -eu
          # Only flag NEW TBD lines (added in this PR), not pre-existing ones.
          # `git diff --diff-filter=AM` shows added/modified lines.
          ADDED_TBD=$(git diff --diff-filter=AM origin/${{ github.base_ref }}...HEAD -- ':(exclude)*.lock' \
            | grep -E '^\+' \
            | grep -E '<TBD:[^>]+>' \
            || true)
          if [ -n "$ADDED_TBD" ]; then
            echo "::warning::This PR introduces new <TBD: ...> placeholders:"
            echo "$ADDED_TBD"
            echo "::warning::Acceptable during P0 setup; not after Stichting incorporation."
          fi

  # ---------------------------------------------------------------------------
  # omni-driver-pack-build — build, test, lint, and smoke-test the
  # workspace-excluded `tools/omni-driver-pack` CLI tool (OIP-013 § S5.5).
  #
  # This job is intentionally separate from the main workspace matrix so the
  # bare-metal cross-build matrix is not polluted by std-only tooling deps.
  # ---------------------------------------------------------------------------
  omni-driver-pack-build:
    name: omni-driver-pack (build + test + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry / build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/omni-driver-pack -> target

      # ── build ──────────────────────────────────────────────────────────────
      - name: cargo build --release
        run: cargo build --release --manifest-path tools/omni-driver-pack/Cargo.toml

      # ── unit + integration tests ───────────────────────────────────────────
      - name: cargo test
        run: cargo test --manifest-path tools/omni-driver-pack/Cargo.toml

      # ── lint ───────────────────────────────────────────────────────────────
      - name: cargo clippy -D warnings
        run: |
          cargo clippy \
            --manifest-path tools/omni-driver-pack/Cargo.toml \
            --all-targets -- -D warnings

      # ── smoke test: produce a .opack from fixture inputs ───────────────────
      # Uses the RFC 8032 § 7.1 test-vector 1 seed (32 bytes, 64 hex chars).
      # The fixture manifest ships at tests/fixtures/test-manifest.json and
      # uses the corresponding verifying key as omni_issuer_pubkey.
      # A 64-byte ELF stub is created on-the-fly (the tool only hashes it).
      - name: Smoke test — produce a .opack blob and assert exit 0
        run: |
          set -eu

          # 64-byte fake ELF stub (4-byte ELF magic + 60 NUL bytes).
          printf '\x7fELF' > /tmp/test-driver.elf
          dd if=/dev/zero bs=60 count=1 >> /tmp/test-driver.elf 2>/dev/null

          # Write the RFC 8032 test seed to a temp file.
          printf '9d61b19deffd5a60ba844af492ec2cc44449c5697b326919703bac031cae7f60\n' \
            > /tmp/test.seed
          chmod 0400 /tmp/test.seed

          # Run the tool; exit 0 is the acceptance criterion. The
          # binary lives under tools/omni-driver-pack/target/ because
          # that crate is NOT part of the workspace (excluded via the
          # root Cargo.toml [workspace.exclude] list) and the cargo
          # build step above used --manifest-path, which places the
          # output beside its manifest, not at the repo-root target/.
          ./tools/omni-driver-pack/target/release/omni-driver-pack \
            --manifest     tools/omni-driver-pack/tests/fixtures/test-manifest.json \
            --image        /tmp/test-driver.elf \
            --signing-key  /tmp/test.seed \
            --output       /tmp/test-driver.opack \
            --allow-loose-permissions

          # Assert the blob starts with the OMNIPACK magic.
          MAGIC=$(head -c 8 /tmp/test-driver.opack | od -A n -t x1 | tr -d ' \n')
          if [ "$MAGIC" != "4f4d4e495041434b" ]; then
            echo "ERROR: blob magic mismatch (got $MAGIC, expected 4f4d4e495041434b)"
            exit 1
          fi
          echo "Smoke test passed: blob starts with OMNIPACK magic."
