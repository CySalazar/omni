# =============================================================================
# OMNI OS — CodeQL static analysis
# =============================================================================
# GitHub-hosted static analysis. Rust support is in beta as of 2025; we
# enable it now to catch what it can, and revisit when GA. Findings appear
# in the Security tab of the repo.
# =============================================================================

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan; on-PR scans are faster but lighter.
    - cron: "0 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL — ${{ matrix.language }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        language: [rust]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # `rust/hardcoded-credentials` is excluded for `crates/**/src/`
          # because it false-positives on RFC test vectors in
          # `#[cfg(test)]` blocks (e.g., the Argon2id determinism tests
          # in `crates/omni-crypto/src/kdf.rs`). The config also pins the
          # analysis to `crates/**/src/**`, excluding doc / OIP / framework
          # / scripts paths from CodeQL's scope.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
