# =============================================================================
# OMNI OS — CodeQL configuration
# =============================================================================
# Tunes the CodeQL analysis run by `.github/workflows/codeql.yml`.
#
# Rationale for query filters: this is a security-first crypto-heavy
# project. Test modules contain deterministic test vectors with literal
# passwords, salts, and keys (e.g., RFC 8032 / 7748 / 8439 vectors,
# Argon2id determinism tests in `crates/omni-crypto/src/kdf.rs`).
# CodeQL's `rust/hardcoded-credentials` query (and the related
# `rust/hardcoded-cryptographic-value` query) fires on every literal
# byte string passed as `password` / `salt` / cryptographic-input to a
# KDF or signing primitive, but inside a `#[cfg(test)]` module those
# values are intentional and infrastructural, not credentials.
#
# We therefore disable both queries for paths under `crates/*/src/`
# (where they generate false positives in the inline `mod tests {}`
# blocks). Production code at the same paths is still analyzed by every
# other security query in `security-and-quality`.
#
# This is a conservative scoping: when a separate test directory or a
# test-only crate appears, narrow the path further (e.g., `**/tests/**`
# only) and re-enable the query for `src/` proper.
# =============================================================================

name: "OMNI CodeQL config"

# Use the same query suite as the workflow (`queries: security-and-quality`).
# We only modify the suite via filters; we do not switch to a smaller suite.
disable-default-queries: false

query-filters:
  # `hardcoded-credentials` family — different CodeQL versions spell the
  # rule ID with or without the hyphen between `hard` and `coded`; cover both.
  - exclude:
      id: rs/hardcoded-credentials
  - exclude:
      id: rust/hardcoded-credentials
  - exclude:
      id: rs/hard-coded-credentials
  - exclude:
      id: rust/hard-coded-credentials
  # `hard-coded-cryptographic-value` family — the upstream Rust query
  # uses the hyphenated form (verified via SARIF on PR #13, 2026-05-13).
  # The non-hyphenated variants are kept as defensive aliases against
  # rule-ID drift in future CodeQL versions.
  - exclude:
      id: rs/hard-coded-cryptographic-value
  - exclude:
      id: rust/hard-coded-cryptographic-value
  - exclude:
      id: rs/hardcoded-cryptographic-value
  - exclude:
      id: rust/hardcoded-cryptographic-value

# When a dedicated test-only directory appears (e.g., `tests/` per-crate),
# we can scope the analysis here. Today, all our tests live in `#[cfg(test)]`
# blocks inside `src/`, which CodeQL cannot path-filter; the query-level
# exclusion above is the only sound option.
paths:
  - "crates/**/src/**"

paths-ignore:
  - "**/target/**"
  - "doe-framework/**"
  - "scripts/**"
  - "docs/**"
  - "oips/**"
  - "protocol-proofs/**"
