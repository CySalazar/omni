  <circle cx="95" cy="166" r="8" fill="#0F4C5C"/>
  <circle cx="95" cy="114" r="8" fill="#0F4C5C"/>
  <circle cx="140" cy="140" r="10" fill="#C03221"/>
  <text x="156" y="92" class="label">node · r=8</text>
