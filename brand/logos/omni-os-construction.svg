  <line x1="140" y1="88" x2="140" y2="192" stroke="#0F4C5C" stroke-width="0.4" opacity="0.3"/>
  <line x1="95" y1="114" x2="185" y2="166" stroke="#0F4C5C" stroke-width="0.4" opacity="0.3"/>
  <line x1="95" y1="166" x2="185" y2="114" stroke="#0F4C5C" stroke-width="0.4" opacity="0.3"/>
