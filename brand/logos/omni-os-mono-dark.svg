<?xml version="1.0" encoding="UTF-8"?>
<!--
  OMNI OS — Monochrome (charcoal on light)
  Usage: single-ink reproduction, embossing, low-fidelity print
  Color: #1F2421 (charcoal) on any light background
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" role="img" aria-label="OMNI OS — monochrome ink">
  <defs><style>
    .wordmark { font-family: 'Source Serif 4', Georgia, serif; font-weight: 700; }
    .tagline  { font-family: 'Inter', sans-serif; font-weight: 500; }
  </style></defs>
  <g transform="translate(24,30)">
    <circle cx="30" cy="30" r="26" fill="none" stroke="#1F2421" stroke-width="1.5" opacity="0.45"/>
    <circle cx="30" cy="4" r="4" fill="#1F2421"/>
    <circle cx="52.5" cy="17" r="4" fill="#1F2421"/>
    <circle cx="52.5" cy="43" r="4" fill="#1F2421"/>
    <circle cx="30" cy="56" r="4" fill="#1F2421"/>
    <circle cx="7.5" cy="43" r="4" fill="#1F2421"/>
    <circle cx="7.5" cy="17" r="4" fill="#1F2421"/>
    <circle cx="30" cy="30" r="5" fill="none" stroke="#1F2421" stroke-width="2"/>
    <circle cx="30" cy="30" r="1.5" fill="#1F2421"/>
  </g>
  <text x="108" y="56" class="wordmark" font-size="36" fill="#1F2421" letter-spacing="-0.5">OMNI OS</text>
  <text x="110" y="80" class="tagline" font-size="11" fill="#1F2421" letter-spacing="0.5">A project of OMNI Foundation</text>
</svg>
