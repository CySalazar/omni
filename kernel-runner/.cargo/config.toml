# =============================================================================
# kernel-runner — Cargo target configuration
# =============================================================================
# Rust 1.83+ x86_64-unknown-none has `position_independent_executables = true`
# in the target spec, generating ET_DYN binaries with RIP-relative code.
#
# Historically (pre-MB12) this crate forced ET_EXEC via
# `-C relocation-model=static` + `-C link-arg=--no-pie` because the
# previous `bootloader 0.9` second-stage loader rejected ET_DYN. With
# `bootloader 0.11` (currently pinned in `kernel-runner/Cargo.toml`)
# ET_DYN is fully supported — and **required** for MB12: the bootloader
# applies RIP-relative relocations to honour
# `BootloaderConfig::mappings.kernel_base`, which we use to push the
# kernel image into the upper half (PML4 indices ≥ 256). The upper-half
# kernel mapping is what makes the per-process `AddressSpace`'s
# kernel-half clone (256..511) sufficient for the post-`mov cr3`
# instruction fetch in `enter_user_mode` to land on a mapped page.
#
# Leaving the target spec defaults intact (PIE) keeps the kernel ELF
# `ET_DYN`, which `bootloader 0.11` happily relocates to the dynamic
# range starting at `dynamic_range_start = 0xFFFF_8000_0000_0000`.
# =============================================================================

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=--no-pie",
]
