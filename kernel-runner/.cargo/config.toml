# =============================================================================
# kernel-runner — Cargo target configuration
# =============================================================================
# Rust 1.83+ x86_64-unknown-none has `position_independent_executables = true`
# in the target spec.  This causes rustc to:
#   1. Generate RIP-relative code for globals (relocation model = static-pie)
#   2. Pass `-pie` to the linker → ELF type ET_DYN + DYNAMIC segment
#
# bootloader 0.9's second-stage ELF loader expects ET_EXEC (static,
# fixed-address executable).  When it receives ET_DYN it calls its error
# handler which panics at an infinite `jmp $` loop — confirmed by local
# QEMU in_asm trace (bootloader panics at virtual address 0xBEC0).
#
# Two flags are required to produce ET_EXEC:
#   1. `-C relocation-model=static`   → absolute addressing, no GOT/PLT
#   2. `-C link-arg=--no-pie`         → cancels the `-pie` rustc passes
#                                        to LLD due to the target spec;
#                                        last flag wins in LLD → ET_EXEC
# =============================================================================

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=--no-pie",
]
