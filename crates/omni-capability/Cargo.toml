# =============================================================================
# omni-capability — Capability tokens for OMNI OS
# =============================================================================
# Macaroons-style attenuable, time-bounded, TEE-bound capability tokens.
# Used by every system action that crosses a trust boundary. See
# /docs/04-security-model.md § "Capability-based access control".
# =============================================================================

[package]
name             = "omni-capability"
description      = "Capability tokens for OMNI OS — Macaroons-style attenuable tokens with TEE binding."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
keywords.workspace     = true
categories.workspace   = true
readme.workspace       = true

[lints]
workspace = true

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
# Token canonical encoding uses `bincode` v2 strict-mode (no varints, no
# trailing data), which is byte-deterministic and therefore safe to feed
# into a signature pre-image. The bloom filter used by the revocation
# list is implemented in-crate (see `revocation.rs`) so we avoid pulling
# in `std`-only crates such as `bloomfilter`.
[dependencies]
omni-types  = { workspace = true }
omni-crypto = { workspace = true }
serde       = { workspace = true }
bincode     = { workspace = true }
thiserror   = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
hex      = { workspace = true }
