# =============================================================================
# omni-container ‚Äî OMNI OS micro-VM container engine
# =============================================================================
# Reference implementation for `OIP-Container-006`. Provides a Rust-native
# container engine implementing the Firecracker/Kata micro-VM pattern with
# per-container TEE attestation (Intel TDX / AMD SEV-SNP) as default on
# capable hardware.
#
# Unlike the foundational `no_std + alloc` crates (`omni-types`,
# `omni-crypto`, `omni-capability`, `omni-tee`, `omni-kernel`), this crate
# is **std-enabled**. It runs as a userspace service on the host OMNI OS:
# it talks to KVM via ioctls, manages an OCI image cache on disk, spawns
# per-virtio-backend processes, and exposes a REST API for management
# tools (per `OIP-Container-006` ¬ß 10). std is required for `std::fs`,
# `std::process`, `std::sync`, and `std::net` primitives.
#
# Feature flags (per `OIP-Container-006` ¬ß 10):
#   - `kvm`     (default) ‚Äî KVM-based hypervisor backend. Placeholder
#                            in v0.1; the real implementation lands in
#                            follow-up OIPs (engine, image, virtio
#                            backends).
#   - `tdx`               ‚Äî Intel TDX confidential VM. Transitively
#                            enables `kvm`.
#   - `sev-snp`           ‚Äî AMD SEV-SNP confidential VM. Transitively
#                            enables `kvm`.
#   - `all-backends`      ‚Äî convenience aggregate enabling every
#                            hardware backend; useful for the
#                            `--all-features` audit run on developer
#                            machines.
# =============================================================================

[package]
name             = "omni-container"
description      = "OmniContainer ‚Äî micro-VM container engine for OMNI OS (Linux + Windows-via-Wine) per OIP-Container-006."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
keywords.workspace     = true
categories.workspace   = true
readme.workspace       = true

[lints]
workspace = true

# -----------------------------------------------------------------------------
# Feature flags
# -----------------------------------------------------------------------------
[features]
default      = ["kvm"]
kvm          = []
tdx          = ["kvm"]
sev-snp      = ["kvm"]
all-backends = ["kvm", "tdx", "sev-snp"]

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
[dependencies]
# Internal crates from the workspace.
#
# `omni-types`     ‚Äî workspace error taxonomy + the canonical
#                    wire-encoding helper (`omni-types::wire`). Per
#                    `OIP-Serde-004`, no direct `postcard::*` calls are
#                    allowed in this crate; serialization MUST route
#                    through the helper.
# `omni-capability`‚Äî `CapabilityToken` is the unit of authorization for
#                    every virtio backend's host-side capability check.
# `omni-tee`       ‚Äî provides the `TeeBackend` abstraction used by
#                    `attestation.rs` to generate per-container quotes.
omni-types      = { workspace = true }
omni-capability = { workspace = true }
omni-tee        = { workspace = true }

# Error derive. `thiserror` v2 is the workspace-wide error-derive
# crate (see `docs/09-tech-specifications.md`).
thiserror = { workspace = true }

# Serialization. Used for `OciImageRef`, the OMNI extension manifest in
# image annotations, and `CapabilityProfile` definitions stored as TOML/
# JSON on disk. Outbound encoding routes through `omni-types::wire`.
serde = { workspace = true }

# Async runtime. The engine's `provision` / `run` / `suspend` /
# `terminate` methods are async-friendly because virtio backends are
# spawned as separate processes and managed via IPC. We keep
# `async-trait` to declare the trait surface; concrete async runtime
# selection (tokio vs. smol) is intentionally deferred to a follow-up
# OIP so this scaffold stays minimal.
async-trait = { workspace = true }

# Structured logging at engine and virtio boundaries.
tracing = { workspace = true }

# -----------------------------------------------------------------------------
# Dev-dependencies
# -----------------------------------------------------------------------------
[dev-dependencies]
# Property-based tests for state-machine transitions and profile parsing.
proptest = { workspace = true }
# Future trait-level mocks for `ContainerEngine` when concrete backends
# land; currently unused but retained so `cargo test --all-features` has
# a stable dep graph across the v0.1 ‚Üí v0.2 transition.
mockall = { workspace = true }
