[lints]
workspace = true

# -----------------------------------------------------------------------------
# Dependencies
# -----------------------------------------------------------------------------
# The scaffold is deliberately dependency-light: no `omni-types`, no
# `omni-capability`, no `omni-crypto`. The driver's eventual capability
# surface (MmioMap / DmaMap / IrqAttach / DriverLoad) is mediated by the
# kernel; the user-space driver process only needs to issue raw syscalls
# and shape its own data structures. Shared NET channel types
# (`NetRequest`/`NetResponse`/`NetEvent`) live in a future
# `omni-driver-net-common` crate (OIP-015 ┬¦ Reference Implementation);
# they are not needed at the scaffold stage because the FSM operates only
# on FSM-internal state.
[dependencies]

[dev-dependencies]
