# =============================================================================
# omni-runtime — AI Runtime Service
# =============================================================================
# Privileged user-space service exposing AI as a system primitive. Manages
# model lifecycle, inference scheduling, capability validation, and tier
# routing across local / personal cluster / federated mesh / cloud.
# =============================================================================

[package]
name             = "omni-runtime"
description      = "AI Runtime Service for OMNI OS — model lifecycle, inference scheduling, tier routing."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
keywords.workspace     = true
categories.workspace   = true
readme.workspace       = true

[lints]
workspace = true

[dependencies]
omni-types      = { workspace = true }
omni-crypto     = { workspace = true }
omni-capability = { workspace = true }
omni-tee        = { workspace = true }
omni-hal        = { workspace = true }
# OmniFS in-memory filesystem — used by model_loader to read GGUF files.
omni-fs         = { workspace = true }
tokio           = { workspace = true }
async-trait     = { workspace = true }
serde           = { workspace = true }
tracing         = { workspace = true }
thiserror       = { workspace = true }
# BLAKE3 is the OMNI OS protocol-level hash (workspace pin: 1.5).
# Used by ModelRegistry::load_from_bytes to verify model data integrity
# against the signed hash in the model manifest.
blake3          = { workspace = true }

[dev-dependencies]
mockall  = { workspace = true }
proptest = { workspace = true }
# `criterion` is used for benchmark harness (tech-spec pin: 0.5.x).
# Apache-2.0/MIT dual-licensed; allowlist-compatible.
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name    = "decode_bench"
harness = false
