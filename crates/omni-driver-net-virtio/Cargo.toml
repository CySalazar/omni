# =============================================================================
# omni-driver-net-virtio â€” virtio-net first-party user-space driver scaffold
# =============================================================================
# First-party driver for virtio-net (PCI vendor `0x1AF4`, device `0x1041`
# modern / `0x1000` legacy). Specified by `OIP-Driver-Net-015` Â§ S4 and
# loaded via the `DriverLoad` syscall flow specified by
# `OIP-Driver-Framework-013` Â§ S5.
#
# This is the **P6.7.8.2 scaffold** delivery: skeleton-only `no_std + alloc`
# library that locks the public surface (virtio constants, virtqueue layout
# types, manifest TOML template) without wiring any syscall path. The
# bootable image sibling (`crates/omni-driver-net-virtio-image`, excluded
# from the default workspace matrix like `kernel-runner`) lands in
# P6.7.8.3 together with the device bring-up state machine.
#
# Why a `no_std + alloc` library at this stage:
#   - Matches the precedent `omni-kernel` (lib, workspace member) +
#     `kernel-runner` (excluded image sibling) â€” the lib hosts the
#     auditable logic, the image crate hosts the boot harness.
#   - Keeps the workspace `cargo build --workspace --all-features` green
#     on host targets without a cross-toolchain (the bootable bin would
#     require `x86_64-unknown-none` which is gated to CI / hardware boxes).
#   - Lets clippy / cargo doc / cargo test exercise the crate in the
#     default workspace matrix immediately.
# =============================================================================

