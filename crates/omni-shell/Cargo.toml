# =============================================================================
# omni-shell — System shell for OMNI OS
# =============================================================================
# Initial CLI for OMNI OS interaction. v1 ships a traditional command-line
# shell; the long-term vision is an intent-based shell where natural
# language is the primary interface (e.g., "show me files modified
# yesterday by Marco" lowered into a plan that the user previews and
# approves before execution).
# =============================================================================

[package]
name             = "omni-shell"
description      = "System shell for OMNI OS — initial CLI; intent-based shell follows."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
keywords.workspace     = true
categories.workspace   = true
readme.workspace       = true

[lints]
workspace = true

[dependencies]
thiserror = { workspace = true, default-features = false }
tracing   = { workspace = true, optional = true }

[features]
# `std` is the default: enables tracing and the `print!` output path in the
# REPL. When disabled the crate compiles for `no_std + alloc` targets such as
# `x86_64-unknown-none`, where output is handled by the kernel via syscalls.
default = ["std"]
std = ["tracing"]
