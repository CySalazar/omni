# =============================================================================
# omni-kernel — OMNI OS microkernel
# =============================================================================
# The Rust microkernel: memory management, scheduling, IPC primitives, and
# capability-based security. The kernel TCB is intentionally small;
# everything that can run in user space (drivers, filesystems, networking,
# AI runtime) does.
#
# In Phase 1 this crate becomes a `no_std` bare-metal binary with a custom
# bootloader integration. For v0.1 it is a placeholder library scaffold so
# the workspace compiles end-to-end.
# =============================================================================

