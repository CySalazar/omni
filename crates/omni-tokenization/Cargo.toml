# =============================================================================
# omni-tokenization — PII tokenization service
# =============================================================================
# Local NER classifier + per-user deterministic token vault, running inside
# an attested TEE. Replaces PII with deterministic tokens before any
# inference workload leaves the user's TEE.
# =============================================================================

[package]
name             = "omni-tokenization"
