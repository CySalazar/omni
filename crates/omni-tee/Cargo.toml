# =============================================================================
# omni-tee ŌĆö Trusted Execution Environment abstractions
# =============================================================================
# Vendor-neutral TEE traits with implementations for Intel TDX and AMD SEV-SNP.
# Provides remote attestation generation and verification, sealed key
# provisioning, and confidential workload execution. `no_std + alloc` so the
# crate can be consumed by `omni-kernel` and other bare-metal contexts.
# =============================================================================

[package]
name             = "omni-tee"
description      = "TEE attestation abstractions for OMNI OS ŌĆö Intel TDX, AMD SEV-SNP, vendor-neutral traits."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
homepage.workspace     = true
keywords.workspace     = true
categories.workspace   = true
readme.workspace       = true

[lints]
workspace = true

# -----------------------------------------------------------------------------
# Feature flags
# -----------------------------------------------------------------------------
# The crate is intentionally light-weight by default. The `mock` feature
# enables `MockTeeBackend`, used by every other crate's tests so they can
# exercise TEE-bound code paths without real hardware. Hardware backends are
# strictly opt-in:
#   - `tdx`     ŌĆö Intel TDX backend (requires TDX-capable Xeon).
#   - `sev-snp` ŌĆö AMD SEV-SNP backend (requires Milan+ EPYC).
#
# `default` includes only `mock` so the workspace builds and tests cleanly on
# CI hardware that has no TEE. Production deployments enable the relevant
# hardware feature explicitly.
# -----------------------------------------------------------------------------
[features]
default = ["mock"]
mock    = []
tdx     = []
sev-snp = []
# Convenience aggregate enabling every hardware backend; useful for the
# `--all-features` audit run on developer machines.
all-backends = ["tdx", "sev-snp"]

[dependencies]
# Internal crates from the workspace. `omni-types` is used for the
# project-wide error wiring; `omni-crypto` provides the shared-secret type
# that `derive_key_for` ultimately returns. We keep both as deps even when a
# given build does not exercise every code path, so the workspace dep graph
# is stable across feature toggles.
omni-types  = { workspace = true }
omni-crypto = { workspace = true }

# Error derive ŌĆö `thiserror` v2 selected at workspace level to align with the
# rest of the ecosystem (see `docs/09-tech-specifications.md`).
thiserror   = { workspace = true }

# Serialization ŌĆö `Quote`, `Measurement`, and `SealedBlob` derive `Serialize`
# / `Deserialize` so they can travel through `postcard` (via the canonical
# helper in `omni-types::wire`) on the wire and through `serde_json` in
# audit logs.
serde       = { workspace = true }

# `async-trait` is retained so a future async backend (e.g. a TEE that goes
# through a remote attestation service) can be added without ABI churn. The
# core `TeeBackend` trait stays synchronous; the async variant lives in its
# own module that we will introduce when needed.
async-trait = { workspace = true }

# `tracing` for structured logs at backend boundaries. Reaches stderr in
# host builds, becomes a no-op in `no_std` builds when its `default-features`
# are off. We keep the workspace pin for now.
tracing     = { workspace = true }

[dev-dependencies]
# `mockall` was the original choice for `TeeBackend` mocking. With the
# in-crate `MockTeeBackend` providing deterministic behaviour for every other
# crate's tests, `mockall` is now reserved for trait-level expectation-based
# tests inside this crate only.
mockall  = { workspace = true }
proptest = { workspace = true }
# `postcard` 1.x is the canonical wire encoding for `Quote`,
# `Measurement`, and `SealedBlob`. At M1 of `OIP-Serde-004` round-trip
# tests call `postcard::*` directly; at M2 they migrate to the
# `omni-types::wire` helper and this dev-dependency is dropped in favour
# of `omni-types` re-export.
postcard = { workspace = true }
